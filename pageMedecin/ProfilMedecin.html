<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Profil medecin</title>
        <link rel="stylesheet" href="ProfilMedecin.css">
        <script src="../shared/auth.js" defer></script>
        <script src="ProfilMedecin.js" defer></script>
    </head>
    <body data-require-auth="true" data-require-role="doctor">
        <header>
            <nav>
                <div>
                    <button class="colorGreen"><h2>HR</h2></button>
                    <a href="../pageAccueil/index.html"><button class="Button"><h3>Accueil</h3></button></a>
                    <a href="EspaceMedecin.html"><button class="Button"><h3>Mon planning</h3></button></a>
                    <a href="RendezVousMedecin.html"><button class="Button"><h3>Rendez-vous patients</h3></button></a>
                    <a href="ProfilMedecin.html"><button class="Button activeButton"><h3>Mon profil</h3></button></a>
                    <a href="../pageContact/Contact.html"><button class="Button"><h3>Contact</h3></button></a>
                </div>
                <div>
                    <button class="logoutButton" data-logout-button hidden>Se deconnecter</button>
                </div>
            </nav>
        </header>

        <main class="profilePage">
            <section id="doctorProfileStatusCard" class="profileStatusCard">
                Chargement de votre profil professionnel...
            </section>

            <section id="doctorProfileContent" class="profileContent" hidden>
                <section class="profileHero">
                    <p class="eyebrow">Espace medecin</p>
                    <h1 id="doctorProfileTitle">Mon profil professionnel</h1>
                    <p id="doctorProfileLead" class="profileLead"></p>
                    <div class="heroMeta">
                        <span id="doctorEmailMeta" class="heroPill"></span>
                        <span id="doctorCabinetMeta" class="heroPill"></span>
                    </div>
                </section>

                <section class="profileGrid">
                    <article class="infoCard">
                        <h2>Informations du compte</h2>
                        <form id="doctorProfileForm" class="profileForm">
                            <div class="fieldGrid">
                                <label class="field">
                                    <span>Prenom</span>
                                    <input id="doctorFirstName" type="text" name="firstName" placeholder="Votre prenom">
                                </label>

                                <label class="field">
                                    <span>Nom</span>
                                    <input id="doctorLastName" type="text" name="lastName" placeholder="Votre nom">
                                </label>
                            </div>

                            <div class="fieldGrid">
                                <label class="field">
                                    <span>Email</span>
                                    <input id="doctorEmail" type="email" name="email" readonly>
                                </label>

                                <label class="field">
                                    <span>Specialite</span>
                                    <input id="doctorSpecialty" type="text" name="specialty" placeholder="Votre specialite">
                                </label>
                            </div>

                            <div class="fieldGrid">
                                <label class="field fieldLarge">
                                    <span>Cabinet</span>
                                    <input id="doctorCabinet" type="text" name="cabinetName" placeholder="Nom du cabinet">
                                </label>
                            </div>

                            <section class="settingsSection">
                                <h3>Parametres generaux</h3>

                                <label class="checkboxField">
                                    <input id="doctorEmailNotifications" type="checkbox" name="emailNotificationsEnabled">
                                    <span>Recevoir les notifications par email</span>
                                </label>

                                <label class="checkboxField">
                                    <input id="doctorAppointmentReminders" type="checkbox" name="appointmentRemindersEnabled">
                                    <span>Recevoir les rappels de rendez-vous</span>
                                </label>
                            </section>

                            <div class="formActions">
                                <button id="doctorProfileSaveButton" class="saveButton" type="submit">
                                    Enregistrer les modifications
                                </button>
                            </div>

                            <p id="doctorProfileFormStatus" class="formStatus"></p>
                        </form>
                    </article>

                    <article class="infoCard dangerCard">
                        <h2>Supprimer le compte</h2>
                        <p class="dangerText">
                            Cette action est definitive. Votre compte medecin,
                            vos rendez-vous patients et votre planning seront
                            supprimes.
                        </p>
                        <div class="formActions">
                            <button id="doctorDeleteAccountButton" class="deleteButton" type="button">
                                Supprimer mon compte
                            </button>
                        </div>
                        <p id="doctorDeleteAccountStatus" class="formStatus"></p>
                    </article>
                </section>
            </section>
        </main>
    </body>
</html>
