<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Page de connexion</title>

        <link rel="stylesheet" href="../ConnectionInscription.css">
        <script src="../../shared/auth.js" defer></script>
    </head>

    <body>

        <header>
            <nav>
                <div>
                    <a href="../../pageAccueil/index.html">
                        <button class="colorGreen">&lt; Retour</button>
                    </a>
                </div>
                <div>
                    <button class="logoutButton" data-logout-button hidden>Se déconnecter</button>
                </div>
            </nav>
        </header>

        <main>

            <h1>Connectez-vous</h1>

            <form id="loginForm">

                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" required>

                <button class="colorGreen" type="submit">
                    Se connecter
                </button>

            </form>

        </main>

        <footer>

            <p>Pas encore de compte ?</p>

            <a href="../Inscription/pageInscription.html">
                <button>S'inscrire</button>
            </a>

        </footer>
        <script src="Connexion.js"></script>
    </body>
</html>
