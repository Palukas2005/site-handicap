<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Page d'inscription</title>
        <link rel="stylesheet" href="../ConnectionInscription.css">
    </head>
    <body>
        <header>
            <nav>
                <a href="../../pageAccueil/index.html"><button class="colorGreen">&lt; Retour</button></a>
            </nav>
        </header>
        <main>
            <h1>Inscrivez-vous</h1>
            <form id="registerForm">

                <label for="email">Email: </label>
                <input type="email" id="email" name="email" required>

                <label for="password">Mot de passe: </label>
                <input type="password" id="password" name="password" required>

                <button class="colorGreen" type="submit">S'inscrire</button>

            </form>
        </main>
        <footer>
            <p>Déjà un compte ?</p>
            <a href="../Connection/pageConnection.html"><button>Se connecter</button></a>
        </footer>
        <script src="inscription.js"></script>
    </body>
</html>
