<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Liste des médecins</title>
        <link rel="stylesheet" href="Docteur.css">
        <script src="../shared/doctorConfig.js" defer></script>
        <script src="../shared/auth.js" defer></script>
        <script src="DocteurAPI.js" defer></script>
    </head>
    <body data-require-auth="true" data-require-role="patient">
        <header>
            <nav>
                <div>
                    <button class="colorGreen"><h2>HR</h2></button>
                    <a href="../pageAccueil/index.html"><button class="Button"><h3>Accueil</h3></button></a>
                    <a href="Docteur.html"><button class="Button activeButton"><h3>Docteur</h3></button></a>
                    <a href="../pageRdv/Rdv.html"><button class="Button"><h3>Rendez-vous</h3></button></a>
                    <a href="../pageContact/Contact.html"><button class="Button"><h3>Contact</h3></button></a>
                </div>
                <div>
                    <button class="logoutButton" data-logout-button hidden>Se déconnecter</button>
                </div>
            </nav>
        </header>
        <main class="directoryPage">
            <section class="directoryIntro">
                <p class="eyebrow">Annuaire medical</p>
                <h1>Trouvez un profil de medecin disponible</h1>
                <p class="introText">
                    Retrouvez une selection de profils medicaux pour avancer plus
                    facilement dans votre parcours et identifier rapidement un
                    interlocuteur utile.
                </p>
            </section>

            <section class="searchPanel">
                <label class="searchField" for="doctorSearchInput">
                    <span>Rechercher un medecin</span>
                    <input
                        id="doctorSearchInput"
                        type="search"
                        placeholder="Nom, cabinet, ville ou email"
                    >
                </label>
                <p class="searchHint">
                    Recherchez par exemple <strong>Louis</strong> pour retrouver
                    le planning du medecin principal.
                </p>
            </section>

            <section class="directoryResults">
                <div id="resultats" class="medecinsGrid"></div>
            </section>
        </main>
    </body>
</html>
